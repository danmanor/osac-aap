aap:
  instance:
    enabled: true
    name: "osac-aap"
    controller:
      disabled: false
    eda:
      disabled: true
    hub:
      disabled: true
    lightspeed:
      disabled: true
    redisMode: standalone
    routeTlsTerminationMechanism: Edge
    imagePullPolicy: IfNotPresent

bootstrap:
  enabled: true
  image: ghcr.io/osac-project/osac-aap:latest
  cliImage: quay.io/openshift/origin-cli:4.20.0
  backoffLimit: 15

configAsCode:
  manifestSecret: "config-as-code-manifest-ig"
  secret: "config-as-code-ig"
  eeImage: ""
  projectGitUri: ""
  projectGitBranch: ""
  importAgentsEnabled: false
  importBcmAgentsEnabled: false

importAgents:
  servers: []
  # servers:
  #   - name: "server-01"
  #     bmc_url: "redfish-virtualmedia+https://192.168.1.1:8000/redfish/v1/Systems/1"
  #     bmc_username: "admin"
  #     bmc_password: "password"
  #     boot_mac: "00:8f:09:3e:24:af"
  #     netris_server_name: "server-01"
  #     resource_class: "x86_64"

importBcmAgents:
  cert: ""
  key: ""

serviceAccounts:
  osacSa: "osac-sa"
  templatePublisher: "template-publisher"
