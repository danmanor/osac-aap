---
# Deletes per-tenant VAST view policies during teardown.
# Handles both per-protocol names (osac-{tenant}-{protocol}) and legacy
# single-policy names (osac-{tenant}).
# Best-effort cleanup — ignore_errors throughout.
#
# Requires in scope:
#   _vast_vms_conn      — VAST VMS connection dict
#   tenant_name         — play-level var
#   _vast_vp_protocol   — protocol for this view policy (from loop_var)
#
# Sets output fact:
#   _vast_view_policy_delete_failed

- name: Delete per-protocol view policy (osac-{{ tenant_name }}-{{ _vast_vp_protocol }})
  vastdata.vms.viewpolicies:
    vms: "{{ _vast_vms_conn }}"
    name: "osac-{{ tenant_name }}-{{ _vast_vp_protocol }}"
    state: absent
  register: _vast_view_policy_delete_result
  ignore_errors: true  # noqa: ignore-errors
  no_log: true

- name: Delete legacy view policy (osac-{{ tenant_name }})
  vastdata.vms.viewpolicies:
    vms: "{{ _vast_vms_conn }}"
    name: "osac-{{ tenant_name }}"
    state: absent
  ignore_errors: true  # noqa: ignore-errors
  no_log: true

- name: Set view policy deletion result fact for caller
  ansible.builtin.set_fact:
    _vast_view_policy_delete_failed: "{{ _vast_view_policy_delete_result is failed }}"

- name: Accumulate view policy deletion failures across loop
  ansible.builtin.set_fact:
    _vast_view_policy_any_delete_failed: >-
      {{ (_vast_view_policy_any_delete_failed | default(false) | bool) or (_vast_view_policy_delete_failed | bool) }}

- name: Log view policy deletion outcome
  ansible.builtin.debug:
    msg: >-
      View policy 'osac-{{ tenant_name }}-{{ _vast_vp_protocol }}' deletion:
      {{ 'succeeded' if not (_vast_view_policy_delete_failed | bool) else 'failed (ignored)' }}
